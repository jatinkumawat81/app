<div class="flex flex-col gap-6">

    <h2 class="text-2xl font-semibold text-gray-700 mt-6">
        Users List
    </h2>
  <div class="bg-white shadow-lg rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm text-gray-700">

        <thead class="bg-gray-100 text-gray-600 uppercase text-xs tracking-wider">
          <tr>
            <th class="px-6 py-4 text-left">Username</th>
            <th class="px-6 py-4 text-left">Email</th>
            <th class="px-6 py-4 text-left">Full Name</th>
            <th class="px-6 py-4 text-left">Description</th>
            <th class="px-6 py-4 text-center">Visit Page</th>
          </tr>
        </thead>

        <tbody>
            @for ( user of users(); track $index) {
                <tr
                  class="hover:bg-gray-50 transition duration-150"
                >
                  <td class="px-6 py-4 font-medium text-gray-900">
                    {{ user.username }}
                  </td>
      
                  <td class="px-6 py-4 text-gray-600">
                    {{ user.email }}
                  </td>
      
                  <td class="px-6 py-4">
                    {{ user.fullName }}
                  </td>
      
                  <td class="px-6 py-4">
                    <span class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-700 rounded-full">
                      {{ user.description }}
                    </span>
                  </td>
      
                  <td class="px-6 py-4 text-center">
                    <button
                      routerLink="/visit-page"
                      class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow cursor-pointer"
                    >
                      Visit Page
                    </button>
                  </td>
                </tr>
            }

        </tbody>

      </table>
    </div>

  </div>

</div>
