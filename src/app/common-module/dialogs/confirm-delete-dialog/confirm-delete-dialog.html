<div class="flex flex-col gap-4 p-6">
    <h2 class="text-lg font-semibold text-red-600">
      Delete Item
    </h2>
    
    <p class="text-gray-600">
    Are you sure you want to delete this item? This action cannot be undone.
    </p>
    
    <div class="flex justify-end items-center gap-3 mt-6">
    
      <button
        class="px-5 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 transition duration-200 cursor-pointer"
        (click)="onCancel()"
      >
        Cancel
      </button>
    
      <button
        class="px-5 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition duration-200 shadow-sm cursor-pointer"
        (click)="onConfirm()"
      >
        Delete
      </button>
    
    </div>
</div>
